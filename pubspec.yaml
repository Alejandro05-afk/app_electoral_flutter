name: control_electoral
description: "Control Electoral para Organización Política - Flutter + Appwrite"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Backend
  appwrite: ^13.0.0

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.6

  # DI
  get_it: ^8.0.0

  # Navigation
  go_router: ^14.0.0

  # Sensores
  geolocator: ^13.0.0
  camera: ^0.11.0
  image: ^4.2.0

  # Offline / Local DB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Conectividad
  connectivity_plus: ^6.0.0

  # Utils
  permission_handler: ^11.3.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
